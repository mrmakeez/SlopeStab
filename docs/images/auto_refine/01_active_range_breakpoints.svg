  <text x="474" y="350" font-size="14" font-family="Segoe UI, Arial">x_crest</text>
  <text x="836" y="350" font-size="14" font-family="Segoe UI, Arial">x_max</text>

  <text x="64" y="320" font-size="13" font-family="Segoe UI, Arial" fill="#424242">Ground polyline</text>
