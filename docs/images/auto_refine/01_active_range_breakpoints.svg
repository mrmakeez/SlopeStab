  <rect x="120" y="80" width="740" height="250" fill="#E6F4FF" stroke="#90CAF9"/>
  <text x="130" y="102" font-size="14" font-family="Segoe UI, Arial" fill="#1565C0">Active range [x_min, x_max]</text>

  <polyline points="60,300 250,300 500,180 940,180" fill="none" stroke="#424242" stroke-width="4"/>
  <line x1="120" y1="330" x2="120" y2="140" stroke="#1E88E5" stroke-width="2"/>
  <line x1="250" y1="330" x2="250" y2="120" stroke="#1E88E5" stroke-width="2"/>
  <line x1="500" y1="330" x2="500" y2="120" stroke="#1E88E5" stroke-width="2"/>
