<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
  <rect width="900" height="360" fill="#ffffff"/>
  <text x="24" y="36" font-family="Arial, sans-serif" font-size="20" fill="#1f2937">CMAES Global: Normalized Mapping to Circular Surface</text>

  <line x1="70" y1="285" x2="860" y2="285" stroke="#374151" stroke-width="2"/>
  <polyline points="120,285 360,285 560,185 760,185" fill="none" stroke="#374151" stroke-width="3"/>
  <text x="610" y="175" font-family="Arial, sans-serif" font-size="13" fill="#374151">ground profile</text>

  <circle cx="260" cy="285" r="4" fill="#dc2626"/>
  <circle cx="650" cy="185" r="4" fill="#dc2626"/>
  <text x="230" y="308" font-family="Arial, sans-serif" font-size="12" fill="#dc2626">entry</text>
  <text x="620" y="208" font-family="Arial, sans-serif" font-size="12" fill="#dc2626">exit</text>

  <path d="M260,285 A255,255 0 0 1 650,185" fill="none" stroke="#059669" stroke-width="3"/>
  <text x="410" y="278" font-family="Arial, sans-serif" font-size="12" fill="#059669">failure arc (below slope)</text>

  <rect x="70" y="60" width="270" height="110" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="85" y="88" font-family="Arial, sans-serif" font-size="14" fill="#1d4ed8">u in [0,1]^3</text>
  <text x="85" y="112" font-family="Arial, sans-serif" font-size="13" fill="#1d4ed8">u_left</text>
  <text x="85" y="132" font-family="Arial, sans-serif" font-size="13" fill="#1d4ed8">u_span</text>
  <text x="85" y="152" font-family="Arial, sans-serif" font-size="13" fill="#1d4ed8">u_beta</text>

  <text x="380" y="102" font-family="Arial, sans-serif" font-size="20" fill="#6b7280">-&gt;</text>

  <rect x="430" y="60" width="390" height="110" fill="#ecfdf5" stroke="#86efac"/>
  <text x="445" y="88" font-family="Arial, sans-serif" font-size="13" fill="#065f46">x_left = map(u_left, x_min, x_max)</text>
  <text x="445" y="112" font-family="Arial, sans-serif" font-size="13" fill="#065f46">x_right = map(u_span, x_left, x_max)</text>
  <text x="445" y="136" font-family="Arial, sans-serif" font-size="13" fill="#065f46">beta = map(u_beta, 0.5 deg, 89.5 deg)</text>
  <text x="445" y="160" font-family="Arial, sans-serif" font-size="13" fill="#065f46">circle from endpoints + beta</text>
</svg>
