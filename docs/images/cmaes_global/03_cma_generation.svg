<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
  <rect width="900" height="360" fill="#ffffff"/>
  <text x="24" y="36" font-family="Arial, sans-serif" font-size="20" fill="#1f2937">Stage 2: Seeded CMA-ES Generations</text>

  <rect x="70" y="70" width="360" height="250" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="85" y="95" font-family="Arial, sans-serif" font-size="13" fill="#334155">Population in normalized space</text>
  <ellipse cx="245" cy="200" rx="130" ry="80" fill="#dbeafe" stroke="#3b82f6"/>
  <circle cx="245" cy="200" r="5" fill="#ef4444"/>
  <text x="255" y="205" font-family="Arial, sans-serif" font-size="12" fill="#ef4444">mean</text>
  <circle cx="190" cy="170" r="4" fill="#2563eb"/>
  <circle cx="210" cy="235" r="4" fill="#2563eb"/>
  <circle cx="275" cy="160" r="4" fill="#2563eb"/>
  <circle cx="320" cy="210" r="4" fill="#2563eb"/>
  <circle cx="280" cy="245" r="4" fill="#2563eb"/>
  <text x="85" y="300" font-family="Arial, sans-serif" font-size="12" fill="#1d4ed8">bounds: reflection + clip + repair</text>

  <rect x="470" y="70" width="350" height="130" fill="#ecfeff" stroke="#22d3ee"/>
  <text x="485" y="98" font-family="Arial, sans-serif" font-size="13" fill="#0e7490">tell(scores) updates covariance and mean</text>
  <text x="485" y="122" font-family="Arial, sans-serif" font-size="13" fill="#0e7490">seeded RNG keeps repeatability per seed</text>
  <text x="485" y="146" font-family="Arial, sans-serif" font-size="13" fill="#0e7490">shared cache reuses prior evaluations</text>
  <text x="485" y="170" font-family="Arial, sans-serif" font-size="13" fill="#0e7490">stall + sigma checks stop stage</text>

  <line x1="470" y1="245" x2="830" y2="245" stroke="#374151" stroke-width="2"/>
  <polyline points="500,245 620,245 730,185 820,185" fill="none" stroke="#374151" stroke-width="3"/>
  <path d="M535,245 A210,210 0 0 1 785,185" fill="none" stroke="#16a34a" stroke-width="3"/>
  <text x="560" y="270" font-family="Arial, sans-serif" font-size="12" fill="#16a34a">decoded candidate arc stays below slope</text>
