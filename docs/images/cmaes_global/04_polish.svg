<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
  <rect width="900" height="360" fill="#ffffff"/>
  <text x="24" y="36" font-family="Arial, sans-serif" font-size="20" fill="#1f2937">Stage 3: Deterministic Bounded Polish</text>

  <rect x="70" y="70" width="370" height="250" fill="#fff7ed" stroke="#fb923c"/>
  <text x="85" y="95" font-family="Arial, sans-serif" font-size="13" fill="#9a3412">Nelder-Mead simplex in normalized space</text>
  <polygon points="150,255 320,245 235,140" fill="#fed7aa" stroke="#ea580c" stroke-width="2"/>
  <circle cx="235" cy="140" r="4" fill="#dc2626"/>
  <text x="245" y="145" font-family="Arial, sans-serif" font-size="12" fill="#dc2626">best</text>
  <text x="85" y="295" font-family="Arial, sans-serif" font-size="12" fill="#9a3412">bounded objective, finite penalties, fixed budget</text>

  <rect x="480" y="70" width="340" height="120" fill="#ecfdf5" stroke="#4ade80"/>
  <text x="495" y="98" font-family="Arial, sans-serif" font-size="13" fill="#166534">After Nelder-Mead, deterministic toe/crest sweeps run</text>
  <text x="495" y="122" font-family="Arial, sans-serif" font-size="13" fill="#166534">to stabilize parity on challenging basins.</text>
  <text x="495" y="146" font-family="Arial, sans-serif" font-size="13" fill="#166534">Final incumbent uses same tie-break policy.</text>

  <line x1="480" y1="245" x2="840" y2="245" stroke="#374151" stroke-width="2"/>
  <polyline points="510,245 645,245 730,185 835,185" fill="none" stroke="#374151" stroke-width="3"/>
  <path d="M545,245 A220,220 0 0 1 790,185" fill="none" stroke="#16a34a" stroke-width="3"/>
  <circle cx="545" cy="245" r="4" fill="#dc2626"/>
  <circle cx="790" cy="185" r="4" fill="#dc2626"/>
</svg>
