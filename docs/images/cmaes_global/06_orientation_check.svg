<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360">
  <rect width="900" height="360" fill="#ffffff"/>
  <text x="24" y="36" font-family="Arial, sans-serif" font-size="20" fill="#1f2937">Orientation Check: Slip Arc Must Stay Below Ground</text>

  <line x1="70" y1="280" x2="860" y2="280" stroke="#374151" stroke-width="2"/>
  <polyline points="130,280 360,280 560,180 780,180" fill="none" stroke="#374151" stroke-width="3"/>
  <text x="600" y="172" font-family="Arial, sans-serif" font-size="12" fill="#374151">ground y_ground(x)</text>

  <circle cx="250" cy="280" r="4" fill="#dc2626"/>
  <circle cx="690" cy="180" r="4" fill="#dc2626"/>
  <text x="220" y="304" font-family="Arial, sans-serif" font-size="12" fill="#dc2626">x_left</text>
  <text x="665" y="202" font-family="Arial, sans-serif" font-size="12" fill="#dc2626">x_right</text>

  <path d="M250,280 A280,280 0 0 1 690,180" fill="none" stroke="#16a34a" stroke-width="4"/>
  <text x="350" y="300" font-family="Arial, sans-serif" font-size="12" fill="#16a34a">valid: y_arc(x) &lt;= y_ground(x)</text>

  <path d="M250,280 A190,190 0 0 0 690,180" fill="none" stroke="#ef4444" stroke-width="3" stroke-dasharray="8 6"/>
  <text x="430" y="128" font-family="Arial, sans-serif" font-size="12" fill="#ef4444">invalid orientation (above ground)</text>

  <rect x="70" y="62" width="460" height="75" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="85" y="88" font-family="Arial, sans-serif" font-size="13" fill="#334155">Documentation validation rule:</text>
  <text x="85" y="112" font-family="Arial, sans-serif" font-size="13" fill="#334155">sample interior points and confirm y_arc(x) &lt;= y_ground(x)</text>
</svg>
