<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <rect width="1000" height="420" fill="#ffffff"/>
  <text x="36" y="38" font-size="24" font-family="Segoe UI, Arial" fill="#111111">D2. Cuckoo Iteration Loop</text>

  <rect x="80" y="86" width="180" height="62" rx="8" fill="#E6F4FF" stroke="#90CAF9"/>
  <text x="102" y="123" font-size="15" font-family="Segoe UI, Arial" fill="#0D47A1">compute alpha(k)</text>

  <rect x="300" y="86" width="180" height="62" rx="8" fill="#F7F9FB" stroke="#B0BEC5"/>
  <text x="318" y="123" font-size="15" font-family="Segoe UI, Arial" fill="#37474F">Levy trial + repair</text>

  <rect x="520" y="86" width="180" height="62" rx="8" fill="#F7F9FB" stroke="#B0BEC5"/>
  <text x="542" y="123" font-size="15" font-family="Segoe UI, Arial" fill="#37474F">evaluate FOS</text>

  <rect x="740" y="86" width="180" height="62" rx="8" fill="#F7F9FB" stroke="#B0BEC5"/>
  <text x="748" y="123" font-size="15" font-family="Segoe UI, Arial" fill="#37474F">random target replace?</text>

  <rect x="740" y="194" width="180" height="62" rx="8" fill="#FFF8E1" stroke="#FFCC80"/>
  <text x="754" y="231" font-size="15" font-family="Segoe UI, Arial" fill="#E65100">abandon worst tail</text>

  <rect x="520" y="194" width="180" height="62" rx="8" fill="#E8F5E9" stroke="#A5D6A7"/>
  <text x="546" y="231" font-size="15" font-family="Segoe UI, Arial" fill="#1B5E20">update incumbent</text>

  <rect x="300" y="194" width="180" height="62" rx="8" fill="#E6F4FF" stroke="#90CAF9"/>
  <text x="329" y="231" font-size="15" font-family="Segoe UI, Arial" fill="#0D47A1">check stopping</text>

  <rect x="80" y="194" width="180" height="62" rx="8" fill="#FDECEA" stroke="#EF9A9A"/>
  <text x="120" y="231" font-size="15" font-family="Segoe UI, Arial" fill="#B71C1C">next iteration</text>

  <line x1="260" y1="117" x2="300" y2="117" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="480" y1="117" x2="520" y2="117" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="700" y1="117" x2="740" y2="117" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="830" y1="148" x2="830" y2="194" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="740" y1="225" x2="700" y2="225" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="520" y1="225" x2="480" y2="225" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="300" y1="225" x2="260" y2="225" stroke="#455A64" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M170 194 L170 164 L830 164" fill="none" stroke="#B0BEC5" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="112" y="274" font-size="13" font-family="Segoe UI, Arial" fill="#546E7A">Loop repeats while stop conditions are not met.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#455A64"/>
    </marker>
  </defs>
</svg>
