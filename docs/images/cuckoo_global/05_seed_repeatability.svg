<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <rect width="1000" height="420" fill="#ffffff"/>
  <text x="36" y="38" font-size="24" font-family="Segoe UI, Arial" fill="#111111">D5. Seeded Repeatability Behavior</text>

  <rect x="70" y="84" width="420" height="286" rx="8" fill="#E8F5E9" stroke="#A5D6A7"/>
  <text x="96" y="118" font-size="17" font-family="Segoe UI, Arial" fill="#1B5E20">Same seed => same trajectory</text>
  <text x="96" y="146" font-size="14" font-family="Consolas, monospace" fill="#2E7D32">run A (seed=0)</text>
  <polyline points="110,250 180,220 250,205 320,172 390,160 460,150" fill="none" stroke="#43A047" stroke-width="3"/>
  <text x="96" y="176" font-size="14" font-family="Consolas, monospace" fill="#2E7D32">run B (seed=0)</text>
  <polyline points="110,250 180,220 250,205 320,172 390,160 460,150" fill="none" stroke="#1B5E20" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="96" y="336" font-size="13" font-family="Segoe UI, Arial" fill="#2E7D32">identical best-FOS history and final surface</text>

  <rect x="510" y="84" width="420" height="286" rx="8" fill="#FFF8E1" stroke="#FFCC80"/>
  <text x="536" y="118" font-size="17" font-family="Segoe UI, Arial" fill="#E65100">Different seed => different path</text>
  <text x="536" y="146" font-size="14" font-family="Consolas, monospace" fill="#EF6C00">run C (seed=1)</text>
  <polyline points="550,250 620,228 690,212 760,186 830,178 900,170" fill="none" stroke="#FB8C00" stroke-width="3"/>
  <text x="536" y="176" font-size="14" font-family="Consolas, monospace" fill="#EF6C00">run D (seed=42)</text>
  <polyline points="550,250 620,238 690,206 760,198 830,172 900,154" fill="none" stroke="#E65100" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="536" y="336" font-size="13" font-family="Segoe UI, Arial" fill="#E65100">trajectory may differ, still bounded by same limits</text>

  <text x="96" y="272" font-size="12" font-family="Segoe UI, Arial" fill="#546E7A">y-axis: best FOS (down is better), x-axis: iteration</text>
</svg>
