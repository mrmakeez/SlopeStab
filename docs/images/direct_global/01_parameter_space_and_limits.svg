<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <rect width="1000" height="420" fill="#ffffff"/>
  <text x="40" y="38" font-size="24" font-family="Segoe UI, Arial" fill="#111">D1. Parameter Space and Search Limits</text>

  <rect x="90" y="90" width="380" height="240" fill="#E6F4FF" stroke="#90CAF9"/>
  <text x="110" y="118" font-size="16" font-family="Segoe UI, Arial" fill="#1565C0">Physical x-domain</text>
  <polyline points="120,270 190,270 300,215 430,215" fill="none" stroke="#424242" stroke-width="4"/>
  <line x1="120" y1="300" x2="120" y2="180" stroke="#1E88E5" stroke-width="2"/>
  <line x1="190" y1="300" x2="190" y2="170" stroke="#1E88E5" stroke-width="2"/>
  <line x1="300" y1="300" x2="300" y2="170" stroke="#1E88E5" stroke-width="2"/>
  <line x1="430" y1="300" x2="430" y2="180" stroke="#1E88E5" stroke-width="2"/>
  <text x="104" y="322" font-size="14" font-family="Segoe UI, Arial">x_min</text>
  <text x="170" y="322" font-size="14" font-family="Segoe UI, Arial">x_toe</text>
  <text x="274" y="322" font-size="14" font-family="Segoe UI, Arial">x_crest</text>
  <text x="406" y="322" font-size="14" font-family="Segoe UI, Arial">x_max</text>
  <text x="170" y="292" font-size="14" font-family="Segoe UI, Arial" fill="#424242">slope ground profile + search_limits</text>

  <rect x="540" y="90" width="380" height="240" fill="#F7F9FB" stroke="#CFD8DC"/>
  <text x="560" y="118" font-size="16" font-family="Segoe UI, Arial" fill="#37474F">Normalized DIRECT space</text>
  <rect x="620" y="150" width="220" height="140" fill="#ffffff" stroke="#607D8B" stroke-width="2"/>
  <text x="640" y="176" font-size="14" font-family="Segoe UI, Arial">u_left in [0,1]</text>
  <text x="640" y="202" font-size="14" font-family="Segoe UI, Arial">u_span in [0,1]</text>
  <text x="640" y="228" font-size="14" font-family="Segoe UI, Arial">u_beta in [0,1]</text>
  <text x="640" y="262" font-size="13" font-family="Segoe UI, Arial" fill="#455A64">3D box partitioned by DIRECT</text>

  <line x1="470" y1="210" x2="540" y2="210" stroke="#E53935" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="486" y="198" font-size="13" font-family="Segoe UI, Arial" fill="#E53935">map</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#E53935"/>
    </marker>
  </defs>
</svg>
