<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <rect width="1000" height="420" fill="#ffffff"/>
  <text x="40" y="38" font-size="24" font-family="Segoe UI, Arial" fill="#111">D2. Mapping u to Circular Surface</text>

  <rect x="70" y="88" width="300" height="250" fill="#F7F9FB" stroke="#CFD8DC"/>
  <text x="90" y="116" font-size="16" font-family="Segoe UI, Arial" fill="#37474F">Normalized input</text>
  <text x="90" y="150" font-size="14" font-family="Segoe UI, Arial">u = (u_left, u_span, u_beta)</text>
  <text x="90" y="182" font-size="14" font-family="Segoe UI, Arial">u_left, u_span, u_beta in [0,1]</text>

  <rect x="400" y="88" width="280" height="250" fill="#E6F4FF" stroke="#90CAF9"/>
  <text x="420" y="116" font-size="16" font-family="Segoe UI, Arial" fill="#1565C0">Mapped endpoints</text>
  <polyline points="430,290 490,290 610,220 660,220" fill="none" stroke="#424242" stroke-width="4"/>
  <path d="M500,284 Q560,350 620,220" fill="none" stroke="#1E88E5" stroke-width="3"/>
  <circle cx="500" cy="284" r="5" fill="#E53935"/>
  <circle cx="620" cy="220" r="5" fill="#E53935"/>
  <text x="470" y="312" font-size="13" font-family="Segoe UI, Arial">(x_left,y_left)</text>
  <text x="586" y="244" font-size="13" font-family="Segoe UI, Arial">(x_right,y_right)</text>

  <rect x="710" y="88" width="240" height="250" fill="#FFF8E1" stroke="#FFE082"/>
  <text x="730" y="116" font-size="16" font-family="Segoe UI, Arial" fill="#EF6C00">Circle construction</text>
  <polyline points="730,250 780,250 900,180 940,180" fill="none" stroke="#424242" stroke-width="4"/>
  <path d="M780,250 Q840,335 900,180" fill="none" stroke="#1E88E5" stroke-width="3"/>
  <text x="738" y="316" font-size="13" font-family="Segoe UI, Arial">beta in [0.5 deg, 89.5 deg]</text>
  <text x="738" y="336" font-size="13" font-family="Segoe UI, Arial">x_sep_min = 0.05 m</text>

  <line x1="370" y1="210" x2="400" y2="210" stroke="#E53935" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="680" y1="210" x2="710" y2="210" stroke="#E53935" stroke-width="3" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#E53935"/>
    </marker>
  </defs>
</svg>
