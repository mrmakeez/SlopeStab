<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <rect width="1000" height="420" fill="#ffffff"/>
  <text x="40" y="38" font-size="24" font-family="Segoe UI, Arial" fill="#111">D3. Initial Deterministic 3x3x3 Seeding</text>

  <rect x="90" y="88" width="820" height="250" fill="#F7F9FB" stroke="#CFD8DC"/>
  <text x="110" y="116" font-size="16" font-family="Segoe UI, Arial" fill="#37474F">Seed centers at (1/6, 1/2, 5/6) per dimension</text>

  <g transform="translate(130,145)">
    <rect x="0" y="0" width="220" height="170" fill="#ffffff" stroke="#607D8B"/>
    <polyline points="0,130 70,130 150,90 220,90" fill="none" stroke="#424242" stroke-width="3"/>
    <line x1="73" y1="0" x2="73" y2="170" stroke="#B0BEC5"/>
    <line x1="146" y1="0" x2="146" y2="170" stroke="#B0BEC5"/>
    <line x1="0" y1="57" x2="220" y2="57" stroke="#B0BEC5"/>
    <line x1="0" y1="114" x2="220" y2="114" stroke="#B0BEC5"/>
    <circle cx="36" cy="28" r="4" fill="#43A047"/>
    <circle cx="110" cy="85" r="4" fill="#E53935"/>
    <circle cx="183" cy="142" r="4" fill="#43A047"/>
    <text x="8" y="190" font-size="12" font-family="Segoe UI, Arial">u_left x u_span slice</text>
  </g>

  <g transform="translate(430,145)">
    <rect x="0" y="0" width="220" height="170" fill="#ffffff" stroke="#607D8B"/>
    <polyline points="0,130 70,130 150,90 220,90" fill="none" stroke="#424242" stroke-width="3"/>
    <line x1="73" y1="0" x2="73" y2="170" stroke="#B0BEC5"/>
    <line x1="146" y1="0" x2="146" y2="170" stroke="#B0BEC5"/>
    <line x1="0" y1="57" x2="220" y2="57" stroke="#B0BEC5"/>
    <line x1="0" y1="114" x2="220" y2="114" stroke="#B0BEC5"/>
    <circle cx="36" cy="142" r="4" fill="#43A047"/>
    <circle cx="110" cy="85" r="4" fill="#E53935"/>
    <circle cx="183" cy="28" r="4" fill="#43A047"/>
    <text x="8" y="190" font-size="12" font-family="Segoe UI, Arial">u_left x u_beta slice</text>
  </g>

  <text x="710" y="160" font-size="13" font-family="Segoe UI, Arial" fill="#455A64">Seeding points shown</text>
  <text x="710" y="178" font-size="13" font-family="Segoe UI, Arial" fill="#455A64">superimposed over slope slices</text>
  <text x="710" y="210" font-size="15" font-family="Segoe UI, Arial" fill="#37474F">Total initial evaluations:</text>
  <text x="710" y="235" font-size="26" font-family="Segoe UI, Arial" fill="#1E88E5">27</text>
  <text x="710" y="265" font-size="13" font-family="Segoe UI, Arial">No random initialization</text>
  <text x="710" y="285" font-size="13" font-family="Segoe UI, Arial">Same sequence every run</text>
</svg>
