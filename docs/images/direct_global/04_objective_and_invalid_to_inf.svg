<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <rect width="1000" height="420" fill="#ffffff"/>
  <text x="40" y="38" font-size="24" font-family="Segoe UI, Arial" fill="#111">D4. Objective Evaluation and Invalid-to-Infinity</text>

  <rect x="90" y="90" width="320" height="240" fill="#E6F4FF" stroke="#90CAF9"/>
  <text x="110" y="118" font-size="16" font-family="Segoe UI, Arial" fill="#1565C0">Candidate surface</text>
  <polyline points="120,250 180,250 300,185 360,185" fill="none" stroke="#424242" stroke-width="4"/>
  <path d="M180,250 Q240,335 300,185" fill="none" stroke="#1E88E5" stroke-width="3"/>
  <text x="110" y="308" font-size="13" font-family="Segoe UI, Arial">evaluate_surface(candidate)</text>

  <line x1="410" y1="210" x2="470" y2="210" stroke="#E53935" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="490" y="90" width="420" height="240" fill="#F7F9FB" stroke="#CFD8DC"/>
  <text x="510" y="118" font-size="16" font-family="Segoe UI, Arial" fill="#37474F">Decision rules</text>

  <rect x="520" y="145" width="175" height="145" fill="#E8F5E9" stroke="#A5D6A7"/>
  <text x="538" y="170" font-size="13" font-family="Segoe UI, Arial" fill="#2E7D32">Valid</text>
  <text x="538" y="195" font-size="12" font-family="Segoe UI, Arial">converged</text>
  <text x="538" y="215" font-size="12" font-family="Segoe UI, Arial">finite FOS</text>
  <text x="538" y="235" font-size="12" font-family="Segoe UI, Arial">finite moments</text>
  <text x="538" y="265" font-size="12" font-family="Segoe UI, Arial">objective = FOS</text>

  <rect x="715" y="145" width="175" height="145" fill="#FFEBEE" stroke="#EF9A9A"/>
  <text x="733" y="170" font-size="13" font-family="Segoe UI, Arial" fill="#C62828">Invalid</text>
  <text x="733" y="195" font-size="12" font-family="Segoe UI, Arial">geometry fail</text>
  <text x="733" y="215" font-size="12" font-family="Segoe UI, Arial">non-converged</text>
  <text x="733" y="235" font-size="12" font-family="Segoe UI, Arial">non-finite term</text>
  <text x="733" y="265" font-size="12" font-family="Segoe UI, Arial">objective = +inf</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#E53935"/>
    </marker>
  </defs>
</svg>
