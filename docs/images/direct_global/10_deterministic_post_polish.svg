<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <rect width="1000" height="420" fill="#ffffff"/>
  <text x="40" y="38" font-size="24" font-family="Segoe UI, Arial" fill="#111">D10. Deterministic Post-Polish</text>

  <rect x="80" y="88" width="840" height="250" fill="#F7F9FB" stroke="#CFD8DC"/>
  <text x="100" y="116" font-size="16" font-family="Segoe UI, Arial" fill="#37474F">After DIRECT global phase, refine incumbent with two fixed passes</text>

  <rect x="130" y="160" width="320" height="130" fill="#E6F4FF" stroke="#90CAF9"/>
  <text x="150" y="188" font-size="14" font-family="Segoe UI, Arial" fill="#1565C0">Pass 1: Toe/Crest local sweep</text>
  <text x="150" y="214" font-size="12" font-family="Segoe UI, Arial">deterministic x-left/x-right samples</text>
  <text x="150" y="234" font-size="12" font-family="Segoe UI, Arial">deterministic beta sweep</text>

  <line x1="450" y1="225" x2="540" y2="225" stroke="#E53935" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="560" y="160" width="320" height="130" fill="#FFF8E1" stroke="#FFE082"/>
  <text x="580" y="188" font-size="14" font-family="Segoe UI, Arial" fill="#EF6C00">Pass 2: Toe-locked beta sweep</text>
  <text x="580" y="214" font-size="12" font-family="Segoe UI, Arial">left endpoint locked at toe</text>
  <text x="580" y="234" font-size="12" font-family="Segoe UI, Arial">sweep beta at fixed right endpoint</text>

  <text x="130" y="318" font-size="12" font-family="Segoe UI, Arial" fill="#455A64">Both passes deterministic; keep best by FOS + stable tie-break.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#E53935"/>
    </marker>
  </defs>
</svg>
